<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment Evaluation Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .progress-bar {
            transition: width 0.3s ease;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 via-indigo-50 to-purple-50 min-h-screen p-6">
    <div class="max-w-6xl mx-auto">
        <!-- Header Section -->
        <div class="bg-white rounded-xl shadow-lg p-8 mb-6">
            <div class="flex items-center gap-3 mb-2">
                <svg class="text-indigo-600" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                </svg>
                <h1 class="text-3xl font-bold text-slate-800">Assessment Evaluation Tool</h1>
            </div>
            <p class="text-slate-600 mb-6">Validate educational assessments aligned to standards and subskills</p>

            <!-- Upload Section -->
            <div class="mb-6">
                <label for="fileUpload" class="flex items-center justify-center w-full px-6 py-8 border-2 border-dashed border-indigo-300 rounded-lg cursor-pointer hover:border-indigo-500 hover:bg-indigo-50 transition">
                    <div class="text-center">
                        <svg class="mx-auto mb-3 text-indigo-400" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        <span class="text-sm font-medium text-slate-600">
                            Click to upload JSON files or drag and drop
                        </span>
                        <p class="text-xs text-slate-500 mt-1">Educational standards format with assessments</p>
                    </div>
                </label>
                <input type="file" id="fileUpload" class="hidden" accept=".json" multiple>
            </div>

            <!-- Stats -->
            <div id="statsSection" class="hidden grid grid-cols-4 gap-4 mb-6">
                <div class="bg-slate-100 rounded-lg p-4 text-center">
                    <div id="statTotal" class="text-2xl font-bold text-slate-800">0</div>
                    <div class="text-sm text-slate-600">Total Assessments</div>
                </div>
                <div class="bg-green-100 rounded-lg p-4 text-center">
                    <div id="statCorrect" class="text-2xl font-bold text-green-700">0</div>
                    <div class="text-sm text-green-600">Validated</div>
                </div>
                <div class="bg-red-100 rounded-lg p-4 text-center">
                    <div id="statIncorrect" class="text-2xl font-bold text-red-700">0</div>
                    <div class="text-sm text-red-600">Issues Found</div>
                </div>
                <div class="bg-yellow-100 rounded-lg p-4 text-center">
                    <div id="statPending" class="text-2xl font-bold text-yellow-700">0</div>
                    <div class="text-sm text-yellow-600">Pending Review</div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div id="actionButtons" class="hidden flex gap-3 mb-6">
                <button id="exportBtn" class="flex items-center gap-2 px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    Export Results
                </button>
                <button id="clearBtn" class="flex items-center gap-2 px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    </svg>
                    Clear All
                </button>
            </div>

            <!-- Files List -->
            <div id="filesList" class="hidden mb-6">
                <h3 class="text-sm font-semibold text-slate-700 mb-2">Uploaded Files:</h3>
                <div id="filesContainer" class="flex flex-wrap gap-2"></div>
            </div>
        </div>

        <!-- Assessment Review Section -->
        <div id="reviewSection" class="hidden bg-white rounded-xl shadow-lg p-8"></div>

        <!-- Empty State -->
        <div id="emptyState" class="bg-white rounded-xl shadow-lg p-12 text-center">
            <svg class="mx-auto mb-4 text-slate-400" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
            </svg>
            <h3 class="text-xl font-semibold text-slate-700 mb-2">No Assessments Loaded</h3>
            <p class="text-slate-500">Upload JSON files containing educational assessments to begin evaluation</p>
        </div>
    </div>

    <script>
        const state = {
            files: [],
            assessments: [],
            currentIndex: 0,
            evaluations: {}
        };

        const issueTypes = [
            'Question clarity',
            'Answer accuracy',
            'Alignment with subskill',
            'Grade-level appropriateness',
            'Options quality',
            'Cognitive depth mismatch'
        ];

        // File Upload Handler
        document.getElementById('fileUpload').addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const jsonData = JSON.parse(event.target.result);
                        const dataArray = Array.isArray(jsonData) ? jsonData : [jsonData];
                        
                        dataArray.forEach((item, itemIdx) => {
                            if (item.output && item.output.assessments) {
                                const metadata = item.output.metadata || {};
                                const mainContent = item.output.main_content || {};
                                
                                item.output.assessments.forEach((assessment, idx) => {
                                    let relatedTopic = null;
                                    let relatedSubtopic = null;
                                    
                                    for (const [topicKey, topicData] of Object.entries(mainContent)) {
                                        if (topicData.subtopics) {
                                            const foundSubtopic = topicData.subtopics.find(
                                                st => st.subskill === assessment.subskill_reference
                                            );
                                            if (foundSubtopic) {
                                                relatedTopic = topicData;
                                                relatedSubtopic = foundSubtopic;
                                                break;
                                            }
                                        }
                                    }
                                    
                                    state.assessments.push({
                                        id: `${file.name}-${itemIdx}-${idx}`,
                                        fileName: file.name,
                                        type: assessment.type,
                                        question: assessment.question,
                                        correctResponse: assessment.correct_response,
                                        options: assessment.options || [],
                                        subskillReference: assessment.subskill_reference,
                                        metadata: {
                                            standardId: metadata.standard_id,
                                            gradeBand: metadata.grade_band,
                                            cognitiveDepth: metadata.cognitive_depth,
                                            superskill: metadata.superskill
                                        },
                                        relatedTopic: relatedTopic,
                                        relatedSubtopic: relatedSubtopic
                                    });
                                });
                            }
                        });
                        
                        state.files.push(file.name);
                        updateUI();
                    } catch (error) {
                        alert(`Error parsing ${file.name}: ${error.message}`);
                    }
                };
                reader.readAsText(file);
            });
        });

        // Update Statistics
        function updateStats() {
            const correct = Object.values(state.evaluations).filter(e => e.status === 'correct').length;
            const incorrect = Object.values(state.evaluations).filter(e => e.status === 'incorrect').length;
            const pending = state.assessments.length - Object.keys(state.evaluations).length;
            
            document.getElementById('statTotal').textContent = state.assessments.length;
            document.getElementById('statCorrect').textContent = correct;
            document.getElementById('statIncorrect').textContent = incorrect;
            document.getElementById('statPending').textContent = pending;
        }

        // Render Assessment
        function renderAssessment() {
            const assessment = state.assessments[state.currentIndex];
            if (!assessment) return;
            
            const evaluation = state.evaluations[assessment.id] || { status: 'pending', notes: '', issues: [] };
            
            const statusBadge = evaluation.status === 'correct' 
                ? '<div class="flex items-center gap-2 px-4 py-2 rounded-lg bg-green-100 text-green-700"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg><span class="font-medium capitalize">Validated</span></div>'
                : evaluation.status === 'incorrect'
                ? '<div class="flex items-center gap-2 px-4 py-2 rounded-lg bg-red-100 text-red-700"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg><span class="font-medium capitalize">Issues Found</span></div>'
                : '';

            const optionsHTML = assessment.options.length > 0 
                ? `<div class="mb-6">
                    <h3 class="text-lg font-semibold text-slate-800 mb-3">Options:</h3>
                    <div class="space-y-2">
                        ${assessment.options.map((opt, idx) => 
                            `<div class="p-3 bg-slate-50 rounded-lg text-slate-700 border border-slate-200">
                                ${String.fromCharCode(65 + idx)}. ${opt}
                            </div>`
                        ).join('')}
                    </div>
                </div>`
                : '';

            const relatedContentHTML = assessment.relatedTopic 
                ? `<div class="bg-blue-50 rounded-lg p-4 mb-6 border border-blue-100">
                    <div class="flex items-center gap-2 mb-3">
                        <svg class="text-blue-600" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"></path>
                            <path d="M12 4v1M17.66 6.34l-.828.828M20 12h-1M17.66 17.66l-.828-.828M12 19v1M7.17 17.66l.828-.828M6 12H5M7.17 6.34l.828.828"></path>
                        </svg>
                        <h3 class="font-semibold text-blue-900">Related Learning Content</h3>
                    </div>
                    <div class="mb-3">
                        <span class="font-medium text-blue-700">Topic:</span>
                        <div class="text-slate-700">${assessment.relatedTopic.title}</div>
                    </div>
                    ${assessment.relatedSubtopic ? `
                        <div>
                            <span class="font-medium text-blue-700">Subskill:</span>
                            <div class="text-slate-700 text-sm mb-2">${assessment.relatedSubtopic.subskill}</div>
                            <div class="text-slate-600 text-sm bg-white p-3 rounded border border-blue-200">
                                ${assessment.relatedSubtopic.details}
                            </div>
                        </div>
                    ` : ''}
                </div>`
                : '';

            const issuesHTML = issueTypes.map(issue => {
                const isSelected = evaluation.issues.includes(issue);
                return `<button onclick="toggleIssue('${issue}')" class="px-3 py-2 rounded-lg text-sm font-medium transition ${
                    isSelected ? 'bg-red-600 text-white' : 'bg-slate-100 text-slate-700 hover:bg-slate-200'
                }">${issue}</button>`;
            }).join('');

            const progress = Math.round((Object.keys(state.evaluations).length / state.assessments.length) * 100);

            document.getElementById('reviewSection').innerHTML = `
                <div class="flex items-center justify-between mb-6">
                    <div>
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-sm font-semibold text-slate-700">
                                Assessment ${state.currentIndex + 1} of ${state.assessments.length}
                            </span>
                            <span class="px-2 py-1 bg-purple-100 text-purple-700 rounded text-xs font-medium">
                                ${assessment.type.replace(/_/g, ' ')}
                            </span>
                        </div>
                        <div class="text-xs text-slate-400">
                            Source: ${assessment.fileName}
                        </div>
                    </div>
                    ${statusBadge}
                </div>

                <div class="bg-indigo-50 rounded-lg p-4 mb-6 border border-indigo-100">
                    <div class="flex items-center gap-2 mb-3">
                        <svg class="text-indigo-600" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <circle cx="12" cy="12" r="4"></circle>
                        </svg>
                        <h3 class="font-semibold text-indigo-900">Standard Metadata</h3>
                    </div>
                    <div class="grid grid-cols-2 gap-3 text-sm">
                        <div>
                            <span class="font-medium text-indigo-700">Grade Band:</span>
                            <div class="text-slate-700">${assessment.metadata.gradeBand}</div>
                        </div>
                        <div>
                            <span class="font-medium text-indigo-700">Standard:</span>
                            <div class="text-slate-700">${assessment.metadata.standardId}</div>
                        </div>
                        <div class="col-span-2">
                            <span class="font-medium text-indigo-700">Superskill:</span>
                            <div class="text-slate-700">${assessment.metadata.superskill}</div>
                        </div>
                        <div class="col-span-2">
                            <span class="font-medium text-indigo-700">Cognitive Depth:</span>
                            <div class="text-slate-700">${assessment.metadata.cognitiveDepth}</div>
                        </div>
                    </div>
                </div>

                ${relatedContentHTML}

                <div class="mb-6">
                    <h3 class="text-lg font-semibold text-slate-800 mb-3">Question:</h3>
                    <p class="text-slate-700 bg-slate-50 p-4 rounded-lg border border-slate-200">
                        ${assessment.question}
                    </p>
                </div>

                ${optionsHTML}

                <div class="mb-6">
                    <h3 class="text-lg font-semibold text-slate-800 mb-3">Correct Response:</h3>
                    <p class="text-slate-700 bg-green-50 p-4 rounded-lg border border-green-200">
                        ${assessment.correctResponse}
                    </p>
                </div>

                <div class="mb-6">
                    <h3 class="text-lg font-semibold text-slate-800 mb-3">Identify Issues:</h3>
                    <div class="flex flex-wrap gap-2">
                        ${issuesHTML}
                    </div>
                </div>

                <div class="mb-6">
                    <h3 class="text-lg font-semibold text-slate-800 mb-3">Evaluation Notes:</h3>
                    <textarea id="notesArea" class="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent" rows="4" placeholder="Add detailed notes about the assessment quality, accuracy, alignment...">${evaluation.notes}</textarea>
                </div>

                <div class="flex gap-4 mb-6">
                    <button onclick="setEvaluation('correct')" class="flex-1 flex items-center justify-center gap-2 px-6 py-3 rounded-lg font-medium transition ${
                        evaluation.status === 'correct' ? 'bg-green-600 text-white' : 'bg-green-100 text-green-700 hover:bg-green-200'
                    }">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                            <polyline points="22 4 12 14.01 9 11.01"></polyline>
                        </svg>
                        Validated - Correct & Accurate
                    </button>
                    <button onclick="setEvaluation('incorrect')" class="flex-1 flex items-center justify-center gap-2 px-6 py-3 rounded-lg font-medium transition ${
                        evaluation.status === 'incorrect' ? 'bg-red-600 text-white' : 'bg-red-100 text-red-700 hover:bg-red-200'
                    }">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="15" y1="9" x2="9" y2="15"></line>
                            <line x1="9" y1="9" x2="15" y2="15"></line>
                        </svg>
                        Issues Found - Needs Revision
                    </button>
                </div>

                <div class="flex justify-between items-center pt-6 border-t">
                    <button onclick="goToPrevious()" ${state.currentIndex === 0 ? 'disabled' : ''} class="px-6 py-2 bg-slate-200 text-slate-700 rounded-lg hover:bg-slate-300 disabled:opacity-50 disabled:cursor-not-allowed transition">
                        ← Previous
                    </button>
                    <div class="text-center">
                        <div class="text-sm text-slate-500 mb-1">Progress: ${progress}%</div>
                        <div class="w-48 bg-slate-200 rounded-full h-2">
                            <div class="bg-indigo-600 h-2 rounded-full progress-bar" style="width: ${progress}%"></div>
                        </div>
                    </div>
                    <button onclick="goToNext()" ${state.currentIndex === state.assessments.length - 1 ? 'disabled' : ''} class="px-6 py-2 bg-slate-200 text-slate-700 rounded-lg hover:bg-slate-300 disabled:opacity-50 disabled:cursor-not-allowed transition">
                        Next →
                    </button>
                </div>
            `;

            // Add event listener for notes
            document.getElementById('notesArea').addEventListener('input', (e) => {
                const currentEval = state.evaluations[assessment.id] || { status: 'pending', issues: [] };
                state.evaluations[assessment.id] = {
                    ...currentEval,
                    notes: e.target.value,
                    timestamp: new Date().toISOString()
                };
            });
        }

        // Toggle Issue
        function toggleIssue(issue) {
            const assessment = state.assessments[state.currentIndex];
            const currentEval = state.evaluations[assessment.id] || { status: 'pending', notes: '', issues: [] };
            const issues = currentEval.issues.includes(issue)
                ? currentEval.issues.filter(i => i !== issue)
                : [...currentEval.issues, issue];
            
            state.evaluations[assessment.id] = {
                ...currentEval,
                issues,
                timestamp: new Date().toISOString()
            };
            
            renderAssessment();
        }

        // Set Evaluation
        function setEvaluation(status) {
            const assessment = state.assessments[state.currentIndex];
            const currentEval = state.evaluations[assessment.id] || { notes: '', issues: [] };
            
            state.evaluations[assessment.id] = {
                ...currentEval,
                status,
                timestamp: new Date().toISOString()
            };
            
            updateStats();
            renderAssessment();
        }

        // Navigation
        function goToNext() {
            if (state.currentIndex < state.assessments.length - 1) {
                state.currentIndex++;
                renderAssessment();
            }
        }

        function goToPrevious() {
            if (state.currentIndex > 0) {
                state.currentIndex--;
                renderAssessment();
            }
        }

        // Export Results
        document.getElementById('exportBtn').addEventListener('click', () => {
            const results = state.assessments.map(a => ({
                fileName: a.fileName,
                type: a.type,
                question: a.question,
                correctResponse: a.correctResponse,
                subskillReference: a.subskillReference,
                evaluation: state.evaluations[a.id] || { status: 'pending', notes: '', issues: [] },
                metadata: a.metadata
            }));

            const summary = {
                totalAssessments: state.assessments.length,
                correct: Object.values(state.evaluations).filter(e => e.status === 'correct').length,
                incorrect: Object.values(state.evaluations).filter(e => e.status === 'incorrect').length,
                pending: state.assessments.length - Object.keys(state.evaluations).length,
                evaluationDate: new Date().toISOString()
            };

            const exportData = { summary, results };
            const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `assessment-evaluation-${Date.now()}.json`;
            a.click();
        });

        // Clear All
        document.getElementById('clearBtn').addEventListener('click', () => {
            if (confirm('Are you sure you want to clear all data?')) {
                state.files = [];
                state.assessments = [];
                state.currentIndex = 0;
                state.evaluations = {};
                updateUI();
            }
        });

        // Update UI
        function updateUI() {
            const hasAssessments = state.assessments.length > 0;
            
            document.getElementById('emptyState').classList.toggle('hidden', hasAssessments);
            document.getElementById('statsSection').classList.toggle('hidden', !hasAssessments);
            document.getElementById('actionButtons').classList.toggle('hidden', !hasAssessments);
            document.getElementById('filesList').classList.toggle('hidden', state.files.length === 0);
            document.getElementById('reviewSection').classList.toggle('hidden', !hasAssessments);
            
            if (state.files.length > 0) {
                document.getElementById('filesContainer').innerHTML = state.files.map(
                    f => `<span class="px-3 py-1 bg-indigo-100 text-indigo-700 rounded-full text-sm">${f}</span>`
                ).join('');
            }
            
            if (hasAssessments) {
                updateStats();
                renderAssessment();
            }
        }
    </script>
</body>
</html>
